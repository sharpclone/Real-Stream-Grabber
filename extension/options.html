<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Grabber Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Media Grabber Settings</h1>
      <section class="section">
        <label class="toggle">
          <input type="checkbox" id="use-cookies" />
          <span>Use Firefox cookies for downloads</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="ask-filename" />
          <span>Prompt for filename before download</span>
        </label>
      </section>

      <section class="section">
        <label class="field">
          <span>Default download folder (absolute path)</span>
          <div class="input-row">
            <input type="text" id="download-dir" placeholder="/home/user/Downloads" />
            <button id="browse-dir" class="btn">Browse…</button>
          </div>
        </label>
        <p class="hint">Leave empty to use the native host directory.</p>
      </section>

      <section class="section">
        <label class="field">
          <span>Node.js path (optional)</span>
          <input type="text" id="node-path" placeholder="/usr/bin/node" />
        </label>
        <div class="row">
          <button id="detect-node" class="btn">Detect Node.js</button>
          <span id="node-status" class="status"></span>
        </div>
      </section>

      <button id="save" class="btn primary">Save Settings</button>
      <p id="save-status" class="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
